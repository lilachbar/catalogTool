<!DOCTYPE html>
<html lang="en"{% if guide_theme %} data-theme="{{ guide_theme }}"{% endif %}>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Catalog Tool — User Guide</title>
  <link rel="icon" href="/static/favicon.svg">
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-soft: #475569;
      --text-muted: #64748b;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.1);
      --code-bg: #f1f5f9;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    html[data-theme="dark"] {
      --bg: #0b1220;
      --surface: #111a2b;
      --surface-soft: #16223a;
      --border: #24324c;
      --text: #e6edf7;
      --text-soft: #b3c0d4;
      --text-muted: #8595ad;
      --accent: #6ea8fe;
      --accent-soft: rgba(110, 168, 254, 0.14);
      --code-bg: #0e1728;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }
    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) {
        --bg: #0b1220;
        --surface: #111a2b;
        --surface-soft: #16223a;
        --border: #24324c;
        --text: #e6edf7;
        --text-soft: #b3c0d4;
        --text-muted: #8595ad;
        --accent: #6ea8fe;
        --accent-soft: rgba(110, 168, 254, 0.14);
        --code-bg: #0e1728;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .guide-topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .guide-brand { display: flex; align-items: center; gap: 0.625rem; font-weight: 700; }
    .guide-brand img { width: 26px; height: 26px; border-radius: 7px; }
    .guide-brand span { font-size: 0.95rem; }
    .guide-topbar-actions { display: flex; gap: 0.5rem; }
    .guide-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      font-size: 0.82rem;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-soft);
      cursor: pointer;
    }
    .guide-btn:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
    .guide-btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .guide-btn-primary:hover { color: #fff; filter: brightness(1.05); }
    .guide-layout {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 2.5rem;
      max-width: 1080px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }
    .guide-toc {
      position: sticky;
      top: 84px;
      align-self: start;
      max-height: calc(100vh - 110px);
      overflow: auto;
      font-size: 0.85rem;
    }
    .guide-toc-title {
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin: 0 0 0.75rem 0.25rem;
    }
    .guide-toc a {
      display: block;
      padding: 0.28rem 0.6rem;
      border-radius: 7px;
      color: var(--text-soft);
      border-left: 2px solid transparent;
    }
    .guide-toc a:hover { background: var(--surface-soft); text-decoration: none; }
    .guide-toc a.lvl-3 { padding-left: 1.4rem; font-size: 0.8rem; color: var(--text-muted); }
    .guide-toc a.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-soft); }
    .guide-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.25rem 2.5rem;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .guide-content h1 { font-size: 1.9rem; margin: 0 0 0.75rem; line-height: 1.2; }
    .guide-content h2 {
      font-size: 1.3rem;
      margin: 2.5rem 0 0.9rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      scroll-margin-top: 90px;
    }
    .guide-content h2:first-of-type { border-top: none; padding-top: 0; margin-top: 1.5rem; }
    .guide-content h3 { font-size: 1.05rem; margin: 1.6rem 0 0.6rem; scroll-margin-top: 90px; }
    .guide-content p { margin: 0.7rem 0; color: var(--text-soft); }
    .guide-content ul, .guide-content ol { margin: 0.7rem 0; padding-left: 1.4rem; color: var(--text-soft); }
    .guide-content li { margin: 0.3rem 0; }
    .guide-content li > ul, .guide-content li > ol { margin: 0.3rem 0; }
    .guide-content strong { color: var(--text); }
    .guide-content code {
      font-family: "SF Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.86em;
      background: var(--code-bg);
      padding: 0.12em 0.4em;
      border-radius: 5px;
      border: 1px solid var(--border);
    }
    .guide-content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      overflow: auto;
    }
    .guide-content pre code { background: none; border: none; padding: 0; }
    .guide-content hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .guide-content blockquote {
      margin: 1.1rem 0;
      padding: 0.85rem 1.1rem;
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      background: var(--accent-soft);
    }
    .guide-content blockquote p { margin: 0.35rem 0; color: var(--text); }
    .guide-content blockquote p:first-child { margin-top: 0; }
    .guide-content blockquote p:last-child { margin-bottom: 0; }
    .guide-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.1rem 0;
      font-size: 0.9rem;
    }
    .guide-content th, .guide-content td {
      text-align: left;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      vertical-align: top;
    }
    .guide-content th { background: var(--surface-soft); color: var(--text); }
    @media (max-width: 820px) {
      .guide-layout { grid-template-columns: 1fr; padding-top: 1.25rem; }
      .guide-toc { position: static; max-height: none; margin-bottom: 0.5rem; }
      .guide-content { padding: 1.5rem 1.25rem; }
    }
    @media print {
      .guide-topbar, .guide-toc { display: none; }
      .guide-layout { display: block; max-width: none; padding: 0; }
      .guide-content { border: none; box-shadow: none; padding: 0; }
    }
  </style>
</head>
<body>
  <header class="guide-topbar">
    <div class="guide-brand">
      <img src="/static/logo.svg" alt="">
      <span>AI Catalog Tool · User Guide</span>
    </div>
    <div class="guide-topbar-actions">
      <button type="button" class="guide-btn" onclick="window.print()">Print</button>
      <a class="guide-btn guide-btn-primary" href="/">Back to app</a>
    </div>
  </header>

  <div class="guide-layout">
    {% if guide_toc %}
    <nav class="guide-toc" aria-label="On this page">
      <p class="guide-toc-title">On this page</p>
      {% for item in guide_toc %}
      <a href="#{{ item.slug }}" class="lvl-{{ item.level }}" data-slug="{{ item.slug }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
    {% endif %}
    <article class="guide-content">
      {{ guide_body | safe }}
    </article>
  </div>

  <script>
    (function () {
      // Highlight the current section in the table of contents while scrolling.
      var links = Array.prototype.slice.call(document.querySelectorAll(".guide-toc a"));
      if (!links.length || !("IntersectionObserver" in window)) return;
      var byId = {};
      links.forEach(function (a) { byId[a.getAttribute("data-slug")] = a; });
      var targets = Object.keys(byId)
        .map(function (id) { return document.getElementById(id); })
        .filter(Boolean);
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            links.forEach(function (a) { a.classList.remove("active"); });
            var a = byId[entry.target.id];
            if (a) a.classList.add("active");
          }
        });
      }, { rootMargin: "-90px 0px -70% 0px", threshold: 0 });
      targets.forEach(function (t) { observer.observe(t); });
    })();
  </script>
</body>
</html>
