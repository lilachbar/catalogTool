<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — AI Catalog Tool</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=20260702login3">
  <script>
    (function () {
      sessionStorage.removeItem("catalogTool.appTabActive");
    })();
  </script>
</head>
<body class="login-page-body">
  <div class="login-bg-shape" aria-hidden="true"></div>

  <main class="login-page" aria-labelledby="loginTitle">
    <div class="login-card">
      <p class="login-eyebrow">AI Catalog Tool</p>
      <h1 id="loginTitle" class="login-title">Hello!</h1>
      <p class="login-subtitle">Sign in with your Amdocs LDAP account</p>

      {% if not ldap_enabled %}
      <div class="login-notice">
        LDAP authentication is disabled. Set <code>LDAP_AUTH_ENABLED=true</code> and <code>LDAP_URI</code> in <code>.env</code>.
      </div>
      {% endif %}

      <form id="loginForm" class="login-form" autocomplete="on">
        <label class="login-pill-field">
          <span class="login-pill-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m2 7 10 7 10-7"/>
            </svg>
          </span>
          <span class="visually-hidden">Username</span>
          <input
            type="text"
            id="usernameInput"
            name="username"
            class="login-pill-input"
            placeholder="Amdocs LDAP username"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            required
            {% if ldap_enabled %}autofocus{% endif %}
          >
        </label>

        <label class="login-pill-field">
          <span class="login-pill-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <span class="visually-hidden">Password</span>
          <input
            type="password"
            id="passwordInput"
            name="password"
            class="login-pill-input"
            placeholder="Password"
            autocomplete="current-password"
            required
          >
        </label>

        <label class="login-pill-field login-pill-field-select">
          <span class="login-pill-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3v3"/><path d="M12 18v3"/><path d="M3 12h3"/><path d="M18 12h3"/>
              <circle cx="12" cy="12" r="4"/>
            </svg>
          </span>
          <span class="visually-hidden">AI provider</span>
          <select id="chatProviderSelect" class="login-pill-input login-pill-select" required>
            <option value="cursor">Cursor</option>
            <option value="openai">OpenAI</option>
            <option value="claude">Claude (Anthropic)</option>
          </select>
        </label>

        <label class="login-pill-field" id="apiKeyField">
          <span class="login-pill-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
          </span>
          <span class="visually-hidden" id="apiKeyLabel">API key</span>
          <input
            type="text"
            id="apiKeyInput"
            class="login-pill-input"
            placeholder="API key"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            data-1p-ignore
            data-lpignore="true"
          >
        </label>

        <p id="loginError" class="login-error" hidden></p>

        <button type="submit" class="login-pill-btn" id="loginSubmitBtn">
          Login
        </button>
      </form>
    </div>
  </main>

  <script>
    (function () {
      const form = document.getElementById("loginForm");
      const errorEl = document.getElementById("loginError");
      const submitBtn = document.getElementById("loginSubmitBtn");
      const providerSelect = document.getElementById("chatProviderSelect");
      const apiKeyInput = document.getElementById("apiKeyInput");
      const nextUrl = {{ next_url | tojson }};

      const providerMeta = {
        cursor: { placeholder: "crsr_…" },
        openai: { placeholder: "sk-… or sk-proj-…" },
        claude: { placeholder: "sk-ant-…" },
      };

      let providerDefaults = {};

      function isMaskedKey(value) {
        return /…/.test(value) || /•/.test(value);
      }

      function showError(message) {
        errorEl.hidden = false;
        errorEl.textContent = message;
      }

      function updateProviderFields() {
        const provider = providerSelect.value;
        const meta = providerMeta[provider];
        if (!meta) {
          return;
        }
        const saved = providerDefaults[provider] || {};
        apiKeyInput.placeholder = saved.configured
          ? saved.maskedApiKey
          : meta.placeholder;
        apiKeyInput.required = !saved.configured;
        apiKeyInput.value = "";
        apiKeyInput.dataset.savedConfigured = saved.configured ? "1" : "0";
        apiKeyInput.dataset.savedMasked = saved.maskedApiKey || "";
      }

      providerSelect.addEventListener("change", updateProviderFields);

      const providerField = providerSelect.closest(".login-pill-field-select");
      providerField?.addEventListener("click", (event) => {
        if (event.target === providerSelect) {
          return;
        }
        providerSelect.focus();
        providerSelect.click();
      });

      async function loadExistingConfig() {
        try {
          const response = await fetch("/api/chat/config");
          if (!response.ok) {
            updateProviderFields();
            return;
          }
          const data = await response.json();
          providerDefaults = data.providers || {};

          if (data.provider && providerMeta[data.provider]) {
            providerSelect.value = data.provider;
          }

          updateProviderFields();
        } catch {
          updateProviderFields();
        }
      }

      loadExistingConfig();

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorEl.hidden = true;
        submitBtn.disabled = true;
        submitBtn.textContent = "Logging in…";

        const provider = providerSelect.value.trim();
        const apiKey = apiKeyInput.value.trim();
        const saved = providerDefaults[provider] || {};

        const payload = {
          username: document.getElementById("usernameInput").value.trim(),
          password: document.getElementById("passwordInput").value,
          next: nextUrl,
          chat_provider: provider,
        };

        if (apiKey && !isMaskedKey(apiKey) && apiKey !== saved.maskedApiKey) {
          payload.api_key = apiKey;
        } else if (!saved.configured) {
          showError("API key is required for the selected AI provider.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Login";
          return;
        }

        try {
          const response = await fetch("/api/user/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Sign in failed.");
          }
          window.location.href = data.redirect || nextUrl || "/";
        } catch (error) {
          showError(error.message || "Sign in failed.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Login";
        }
      });
    })();
  </script>
</body>
</html>
