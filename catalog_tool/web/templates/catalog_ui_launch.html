<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening CatalogOne…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      background: #09090b;
      color: #fafafa;
    }
    .card {
      text-align: center;
      padding: 2rem;
      max-width: 28rem;
    }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    {% if error %}
      <h1 class="error">Could not sign in to CatalogOne</h1>
      <p>{{ error }}</p>
      <p><a href="/">Back to Catalog Tool</a></p>
    {% else %}
      <h1>Signing in to CatalogOne…</h1>
      <p>You will be redirected to the table in a moment.</p>
      <form id="kcLoginForm" method="post" action="{{ login_form.action }}">
        <input type="hidden" name="username" value="{{ login_form.username }}">
        <input type="hidden" name="password" value="{{ login_form.password }}">
      </form>
      <script>
        document.getElementById("kcLoginForm").submit();
      </script>
    {% endif %}
  </div>
</body>
</html>
